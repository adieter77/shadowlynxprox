<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shadowlynx ProX Chat</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f0f0f0; }
    header { background: #111; color: #eee; padding: 1em; text-align: center; }
    #chatbox { padding: 1em; height: 70vh; overflow-y: auto; background: #e5ddd5; }
    .message { max-width: 70%; margin: 0.5em; padding: 0.7em; border-radius: 10px; position: relative; }
    .user { background: #dcf8c6; margin-left: auto; }
    .bot { background: #fff; margin-right: auto; }
    .timestamp { font-size: 0.7em; color: #555; margin-top: 0.3em; text-align: right; }
    #input-area { display: flex; padding: 1em; background: #fff; border-top: 1px solid #ccc; }
    #input { flex: 1; padding: 0.7em; border: 1px solid #ccc; border-radius: 20px; }
    #send { margin-left: 0.5em; padding: 0.7em 1.2em; border: none; background: #4caf50; color: #fff; border-radius: 20px; cursor: pointer; }
    #send:hover { background: #45a049; }
  </style>
</head>
<body>
  <header><h1>Shadowlynx ProX Chat</h1></header>
  <div id="chatbox"></div>
  <div id="input-area">
    <input id="input" type="text" placeholder="Type your message...">
    <button id="send">Send</button>
  </div>

  <script>
    const chatbox = document.getElementById('chatbox');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function addMessage(text, cls) {
      const wrapper = document.createElement('div');
      wrapper.className = "message " + cls;
      wrapper.textContent = text;

      const timestamp = document.createElement('div');
      timestamp.className = "timestamp";
      const now = new Date();
      timestamp.textContent = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      wrapper.appendChild(timestamp);

      chatbox.appendChild(wrapper);
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    async function sendMessage() {
      const msg = input.value.trim();
      if (!msg) return;
      addMessage(msg, "user");
      input.value = "";

      try {
        const res = await fetch("https://shadowlynxprox-1.onrender.com/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: msg })
        });
        const data = await res.json();
        addMessage(data.reply || JSON.stringify(data), "bot");
      } catch (err) {
        addMessage("Error: " + err.message, "bot");
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    input.addEventListener("keypress", e => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
