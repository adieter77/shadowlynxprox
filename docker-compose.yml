version: "3.9"

services:
  # Redis for short-term memory and caching
  redis:
    image: redis:7-alpine
    command: >
      redis-server 
      --appendonly yes 
      --appendfsync everysec 
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - slpx-net

  # Orchestrator (Rust gRPC server)
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: ../deploy/docker/Dockerfile.orchestrator
    ports:
      - "127.0.0.1:50052:50052"
    environment:
      - RUST_LOG=info
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - slpx-net
    restart: unless-stopped

volumes:
  redis_data:

networks:
  slpx-net:
    driver: bridge
