name: Build and Deploy Shadowlynx ProX

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checkout code with latest action (Node.js 24 compatible)
      - uses: actions/checkout@v4

      # Install dependencies needed for Rust + gRPC
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      # Set up Rust toolchain (stable or nightly if required)
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        # If you need nightly for edition2024 support, change to:
        # uses: dtolnay/rust-toolchain@nightly

      # Build orchestrator
      - name: Build orchestrator
        run: cd orchestrator && cargo build --release

      # Build gateway
      - name: Build gateway
        run: cd gateway && cargo build --release

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      # Set up Docker Buildx (latest version, Node.js 24 compatible)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to DockerHub using secrets
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: adieter77/shadowlynxprox:latest
